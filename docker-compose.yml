version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    environment:
      - NOAA_CDO_TOKEN=${NOAA_CDO_TOKEN}
      - PC_SDK_SUBSCRIPTION_KEY=${PC_SDK_SUBSCRIPTION_KEY}
    restart: unless-stopped

  map:
    build: .
    command: python visualization/risk_map.py
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    profiles:
      - tools
