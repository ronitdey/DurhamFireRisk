# Data Sources Configuration
# All paths are relative to project root unless COLAB_MODE=True,
# in which case colab_root is prepended.

paths:
  local_root: "."
  colab_root: "/content/drive/MyDrive/DurhamFireRisk"

  raw:
    lidar: "data/raw/lidar"
    imagery: "data/raw/imagery"
    landfire: "data/raw/landfire"
    dem: "data/raw/dem"
    weather: "data/raw/weather"
    parcels: "data/raw/parcels"

  processed:
    base: "data/processed"
    terrain: "data/processed/terrain"
    vegetation: "data/processed/vegetation"
    structure: "data/processed/structure"
    flood: "data/processed/flood"
    twins: "data/processed/twins"
    simulations: "data/processed/simulations"

  validation:
    base: "data/validation"

# Study area: Randolph Residence Hall proof-of-concept
# 50 Brodie Gym Drive, Durham NC 27705 (Duke East Campus)
# Bbox is ~1km radius around the building for terrain/fire spread context
study_area:
  name: "Randolph Residence Hall - Duke East Campus"
  # ~1km radius around Randolph Hall (36.00688, -78.91714)
  bbox:
    xmin: -78.928
    ymin: 35.997
    xmax: -78.906
    ymax: 36.016
  crs_output: "EPSG:32617"  # UTM Zone 17N

# Target building for proof-of-concept
target_building:
  name: "Randolph Residence Hall"
  address: "50 Brodie Gym Drive, Durham NC 27705"
  parcel_id: "RANDOLPH_001"
  lat: 36.00688194282498
  lon: -78.91714316573827

# NC OneMap LiDAR
# For the single-building PoC, place your LAZ file in data/raw/lidar/
# and the pipeline will auto-discover and process it.
lidar:
  base_url: "https://www.nconemap.gov/pages/lidar"
  wcs_endpoint: "https://geodata.lib.ncsu.edu/geoserver/ows"
  counties:
    - "Durham"
  resolution_m: 1
  ground_class: 2
  veg_classes: [3, 4, 5]
  building_class: 6

# NAIP Aerial Imagery
naip:
  stac_url: "https://planetarycomputer.microsoft.com/api/stac/v1"
  collection: "naip"
  target_year: 2022
  max_cloud_cover: 10
  bands: ["red", "green", "blue", "nir"]
  resolution_m: 0.6

# LANDFIRE
landfire:
  api_base: "https://lfps.usgs.gov/arcgis/rest/services/LandfireProductService/GPServer/LandfireProductService"
  products:
    - "FBFM40"   # Scott-Burgan 40 Fire Behavior Fuel Models
    - "CC"       # Canopy Cover
    - "CH"       # Canopy Height
    - "CBD"      # Canopy Bulk Density
    - "CBH"      # Canopy Base Height
    - "EVT"      # Existing Vegetation Type
  output_resolution_m: 10
  output_crs: "EPSG:32617"

# USGS 3DEP DEM
dem:
  tnm_api: "https://tnmapi.cr.usgs.gov/api/"
  product: "1/3 arc-second"
  resolution_m: 10

# NOAA CDO Weather
weather:
  cdo_api: "https://www.ncdc.noaa.gov/cdo-web/api/v2"
  station_id: "USW00013722"  # RDU International Airport
  station_name: "RDU"
  years_history: 10
  datasets:
    - "GHCND"   # Daily summaries
    - "LCD"     # Local Climatological Data (hourly)
  fire_weather_thresholds:
    rh_max_pct: 25
    wind_min_mph: 15
    temp_min_f: 90

# Durham County Parcels
parcels:
  durham_gis: "https://gisweb.durhamnc.gov/"
  duke_osm_relation: 2329870  # OpenStreetMap relation ID for Duke University

# API keys (set as environment variables, not here)
api_keys:
  noaa_cdo: "${NOAA_CDO_TOKEN}"
  landfire_email: "${LANDFIRE_EMAIL}"   # Required by LANDFIRE API — your email address
  # Planetary Computer NAIP is publicly accessible without a key
